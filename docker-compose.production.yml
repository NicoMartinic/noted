# ─── PRODUCTION ──────────────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.production.yml up --build -d
# Setup:  cp .env.production.example .env.production

services:
  db:
    image: postgres:18.3-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: notes-app-backend-prod
    restart: always
    env_file: .env
    environment:
      DEBUG: "0"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    # Health check so frontend/nginx wait until backend is fully ready
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PORT: ${PORT:-3000}
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    image: notes-app-frontend-prod
    restart: always
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NODE_OPTIONS: "--unhandled-rejections=warn"
    expose:
      - "3000"
    # Wait until backend passes health checks before starting
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/noted.conf:/etc/nginx/conf.d/noted.conf:ro
      # Remove the default vhost that comes bundled with the nginx image
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      # Uncomment to mount SSL certificates:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_prod:
