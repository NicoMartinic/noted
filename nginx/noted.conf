# at the top, add this map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zone — defined at http level via conf.d inclusion
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

# Security headers applied to all responses
add_header X-Frame-Options         "DENY"          always;
add_header X-Content-Type-Options  "nosniff"       always;
add_header Referrer-Policy         "strict-origin" always;
add_header X-XSS-Protection        "1; mode=block" always;

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Django admin
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check — no rate limit so Docker probes always succeed
    location = /api/health/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log         off;
    }

    # Django API — rate limited
    location /api/ {
        limit_req          zone=api burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $connection_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
