# ─── DEVELOPMENT ─────────────────────────────────────────────────────────────
# Usage:              docker compose up --build
# With e2e tests:     docker compose --profile e2e up --build playwright
# Setup:              cp .env.development.example .env

services:
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-notes_db}
      POSTGRES_USER:     ${DB_USER:-notes_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notes_password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notes_user} -d ${DB_NAME:-notes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: notes-app-backend-dev
    restart: unless-stopped
    env_file: .env
    environment:
      DEBUG: "1"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,frontend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/code

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.development
      args:
        PORT: ${PORT:-3000}
        BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    image: notes-app-frontend-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8000

  playwright:
    build:
      context: ./frontend
      dockerfile: Dockerfile.playwright
    image: notes-app-playwright
    profiles: ["e2e"]
    depends_on:
      - frontend
      - backend
    environment:
      BASE_URL: http://frontend:3000
    volumes:
      - ./frontend/e2e:/app/e2e:ro
      - ./frontend/playwright-report:/app/playwright-report
      - ./frontend/test-results:/app/test-results

volumes:
  postgres_data_dev:
